<template>
  <div class="visualizer-container slds-is-relative">
    <!-- Error State -->
    <template if:true={error}>
      <div
        class="slds-notify slds-notify_alert slds-alert_error error-card slds-var-m-bottom_medium"
        role="alert"
      >
        <span class="slds-assistive-text">error</span>
        <lightning-icon
          icon-name="utility:error"
          size="small"
          variant="inverse"
          class="slds-var-m-right_x-small"
        ></lightning-icon>
        <h2>{error}</h2>
        <lightning-button
          label="Retry"
          variant="neutral"
          onclick={handleRetry}
          class="slds-var-m-left_medium"
        ></lightning-button>
      </div>
    </template>

    <!-- Loading State -->
    <template if:false={isReady}>
      <template if:false={error}>
        <div
          class="loading-container slds-align_absolute-center slds-flex_column"
        >
          <lightning-spinner
            alternative-text="Loading diagram..."
            size="medium"
            variant="brand"
          ></lightning-spinner>
          <p class="slds-var-m-top_large loading-text">{loadingMessage}</p>
        </div>
      </template>
    </template>

    <!-- Diagram Workspace -->
    <div class={workspaceClass}>
      <!-- Toolbar Header -->
      <div
        class="toolbar-header slds-grid slds-grid_vertical-align-center slds-grid_align-spread slds-var-p-around_small slds-var-m-bottom_small"
      >
        <!-- Method Selection -->
        <div class="slds-col slds-grid slds-grid_vertical-align-center">
          <div class="slds-col slds-grow-none">
            <span class="visualizer-title">{className}</span>
          </div>
          &nbsp;
          <lightning-combobox
            name="methodSelect"
            label="Select Method"
            value={selectedMethod}
            placeholder="Choose Method"
            options={methodOptions}
            onchange={handleMethodChange}
            class="method-dropdown slds-var-m-right_medium"
            variant="label-hidden"
          >
          </lightning-combobox>
        </div>

        <!-- Control Buttons -->
        <div class="slds-col slds-grid slds-grid_vertical-align-center">
          <!-- Zoom Controls -->
          <lightning-button-group class="slds-var-m-right_medium">
            <lightning-button-icon
              icon-name="utility:zoomout"
              alternative-text="Zoom Out"
              title="Zoom Out"
              onclick={handleZoomOut}
            ></lightning-button-icon>
            <lightning-button
              label={zoomPercentage}
              variant="neutral"
              onclick={handleZoomReset}
              title="Reset Zoom"
              style="min-width: 60px; display: inline-block"
            ></lightning-button>
            <lightning-button-icon
              icon-name="utility:zoomin"
              alternative-text="Zoom In"
              title="Zoom In"
              onclick={handleZoomIn}
            ></lightning-button-icon>
            <lightning-button-icon
              icon-name="utility:expand"
              alternative-text="Fit to Canvas"
              title="Fit to Canvas"
              onclick={handleZoomFit}
            ></lightning-button-icon>
          </lightning-button-group>

          <!-- Action Buttons -->
          <lightning-button
            label="Copy Diagram Code"
            icon-name="utility:copy"
            variant="neutral"
            onclick={handleCopyCode}
            class="slds-var-m-right_small"
          >
          </lightning-button>
          <lightning-button
            label="Open Apex Class"
            icon-name="utility:new_window"
            variant="brand"
            onclick={handleOpenApexClass}
          >
          </lightning-button>
        </div>
      </div>

      <!-- Canvas Wrapper for Panning and Rendering -->
      <div
        class="canvas-wrapper slds-is-relative slds-scrollable_none"
        onmousedown={handleMouseDown}
        onmousemove={handleMouseMove}
        onmouseup={handleMouseUp}
        onmouseleave={handleMouseLeave}
      >
        <div class="diagram-canvas slds-align_absolute-center" lwc:dom="manual">
          <!-- Mermaid SVG elements will be injected manually here -->
        </div>
      </div>
    </div>
  </div>
</template>
