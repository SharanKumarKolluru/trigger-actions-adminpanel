<template>
  <div class="visualizer-container slds-is-relative">
    <!-- Error State -->
    <template if:true={error}>
      <div
        class="slds-notify slds-notify_alert slds-alert_error error-card slds-var-m-bottom_medium"
        role="alert"
      >
        <span class="slds-assistive-text">error</span>
        <lightning-icon
          icon-name="utility:error"
          size="small"
          variant="inverse"
          class="slds-var-m-right_x-small"
        ></lightning-icon>
        <h2>{error}</h2>
        <lightning-button
          label="Try Again"
          variant="neutral"
          onclick={handleRetry}
          class="slds-var-m-left_medium"
        ></lightning-button>
      </div>
    </template>

    <!-- Loading State -->
    <template if:true={showLoading}>
      <div
        class="loading-container slds-align_absolute-center slds-flex_column"
      >
        <div class="spinner-wrapper">
          <div class="double-bounce1"></div>
          <div class="double-bounce2"></div>
        </div>
        <p class="slds-var-m-top_large loading-text">{loadingMessage}</p>
      </div>
    </template>

    <!-- Success Diagram Workspace -->
    <div class={workspaceClass}>
      <!-- Toolbar Header -->
      <div
        class="toolbar-header slds-grid slds-grid_vertical-align-center slds-grid_align-spread slds-var-p-around_small slds-var-m-bottom_small"
      >
        <!-- Title and Custom Controls -->
        <div class="slds-col slds-grid slds-grid_vertical-align-center">
          <span class="visualizer-title">{title}</span>
          <slot name="controls"></slot>
        </div>

        <!-- Zoom and Copy Actions -->
        <div class="slds-col slds-grid slds-grid_vertical-align-center">
          <!-- Zoom Buttons -->
          <lightning-button-group class="slds-var-m-right_medium">
            <lightning-button-icon
              icon-name="utility:zoomout"
              alternative-text="Zoom Out"
              title="Zoom Out"
              onclick={handleZoomOut}
            ></lightning-button-icon>
            <lightning-button
              label={zoomPercentage}
              variant="neutral"
              onclick={handleZoomReset}
              title="Reset Zoom"
              style="min-width: 60px; display: inline-block"
              class="zoom-text-button"
            ></lightning-button>
            <lightning-button-icon
              icon-name="utility:zoomin"
              alternative-text="Zoom In"
              title="Zoom In"
              onclick={handleZoomIn}
            ></lightning-button-icon>
            <lightning-button-icon
              icon-name="utility:expand"
              alternative-text="Fit to Canvas"
              title="Fit to Canvas"
              onclick={handleZoomFit}
            ></lightning-button-icon>
          </lightning-button-group>

          <!-- Action Buttons -->
          <template if:true={hasResources}>
            <lightning-button
              label="View Resources"
              icon-name="utility:list"
              variant="neutral"
              onclick={toggleDrawer}
              class="slds-var-m-right_small"
            ></lightning-button>
          </template>

          <lightning-button
            label="Copy Diagram Code"
            icon-name="utility:copy"
            variant="neutral"
            onclick={handleCopyCode}
            class="slds-var-m-right_small"
          ></lightning-button>

          <template if:true={builderUrl}>
            <lightning-button
              label={effectiveBuilderButtonLabel}
              icon-name="utility:new_window"
              variant="brand"
              onclick={handleRedirect}
            ></lightning-button>
          </template>
        </div>
      </div>

      <!-- Canvas Wrapper for Panning -->
      <div
        class="canvas-wrapper slds-is-relative slds-scrollable_none"
        onmousedown={handleMouseDown}
        onmousemove={handleMouseMove}
        onmouseup={handleMouseUp}
        onmouseleave={handleMouseLeave}
      >
        <div class={canvasClass} lwc:dom="manual"></div>
      </div>
    </div>

    <!-- Sliding Sidebar Drawer & Backdrop Overlay -->
    <template if:true={hasResources}>
      <template if:true={isDrawerOpen}>
        <div class="drawer-backdrop" onclick={toggleDrawer}></div>
      </template>

      <div class={drawerClass}>
        <div
          class="drawer-header slds-grid slds-grid_align-spread slds-grid_vertical-align-center"
        >
          <span class="drawer-title">{drawerTitle}</span>
          <lightning-button-icon
            icon-name="utility:close"
            variant="bare"
            alternative-text="Close"
            onclick={toggleDrawer}
            class="close-button"
          ></lightning-button-icon>
        </div>
        <div class="drawer-content">
          <!-- Variables -->
          <template if:true={hasVariables}>
            <div class="resource-section">
              <h3 class="section-title">Variables ({variablesCount})</h3>
              <div class="resource-list">
                <template for:each={resources.variables} for:item="v">
                  <div key={v.name} class="resource-card">
                    <div
                      class="resource-card-header slds-grid slds-grid_align-spread slds-grid_vertical-align-center"
                    >
                      <span class="resource-name">{v.name}</span>
                      <span class="resource-badge badge-access"
                        >{v.access}</span
                      >
                    </div>
                    <div class="resource-card-body slds-var-m-top_xx-small">
                      <div
                        class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center"
                      >
                        <span class="resource-meta"
                          >Type: <strong>{v.dataType}</strong></span
                        >
                        <template if:true={v.isCollection}>
                          <span class="resource-badge badge-collection"
                            >Collection</span
                          >
                        </template>
                      </div>
                      <template if:true={v.scope}>
                        <div class="resource-scope slds-var-m-top_xxx-small">
                          Scope: <strong>{v.scope}</strong>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <!-- Formulas -->
          <template if:true={hasFormulas}>
            <div class="resource-section">
              <h3 class="section-title">Formulas ({formulasCount})</h3>
              <div class="resource-list">
                <template for:each={resources.formulas} for:item="f">
                  <div key={f.name} class="resource-card">
                    <div
                      class="resource-card-header slds-var-m-bottom_xx-small"
                    >
                      <span class="resource-name">{f.name}</span>
                      <span class="resource-badge badge-type slds-float_right"
                        >{f.dataType}</span
                      >
                    </div>
                    <div class="resource-card-body">
                      <code class="expression-block">{f.expression}</code>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <!-- Constants -->
          <template if:true={hasConstants}>
            <div class="resource-section">
              <h3 class="section-title">Constants ({constantsCount})</h3>
              <div class="resource-list">
                <template for:each={resources.constants} for:item="c">
                  <div key={c.name} class="resource-card">
                    <div
                      class="resource-card-header slds-var-m-bottom_xx-small"
                    >
                      <span class="resource-name">{c.name}</span>
                      <span class="resource-badge badge-type slds-float_right"
                        >{c.dataType}</span
                      >
                    </div>
                    <div class="resource-card-body">
                      <span class="resource-value"
                        >Value: <code>{c.value}</code></span
                      >
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <!-- Text Templates -->
          <template if:true={hasTextTemplates}>
            <div class="resource-section">
              <h3 class="section-title">
                Text Templates ({textTemplatesCount})
              </h3>
              <div class="resource-list">
                <template for:each={resources.textTemplates} for:item="t">
                  <div key={t.name} class="resource-card">
                    <div
                      class="resource-card-header slds-var-m-bottom_xx-small"
                    >
                      <span class="resource-name">{t.name}</span>
                    </div>
                    <div class="resource-card-body">
                      <div class="template-text-wrapper">
                        <pre class="template-text">{t.text}</pre>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>
  </div>
</template>
